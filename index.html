<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻时间线 - NewsTimeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* 头部 */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 15px;
        }
        
        .logo span { color: var(--accent); }
        
        .slogan {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }
        
        /* 分类标签 */
        .categories {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .category-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .category-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .category-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        /* 主内容区 */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 搜索框 */
        .search-container {
            margin-bottom: 20px;
        }
        
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        
        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .search-box::placeholder {
            color: var(--text-secondary);
        }
        
        .search-results {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .search-results span { color: var(--accent); font-weight: 600; }
        
        .clear-search {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
        }
        
        .clear-search:hover { color: var(--text-primary); }
        
        /* 统计信息 */
        .stats {
            display: flex;
            gap: 20px;
            padding: 15px 20px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        
        .stats span { color: var(--accent); font-weight: 600; }
        
        .stats-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 新闻列表 */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .news-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .news-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .news-source {
            color: var(--accent);
            font-weight: 500;
        }
        
        .news-time {
            color: var(--text-secondary);
        }
        
        .news-category {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .news-content {
            font-size: 14px;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }
        
        /* 标签样式 - 优化版 */
        .news-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .tag:hover {
            transform: translateY(-1px);
        }
        
        /* 标签颜色分类 */
        .tag-tech {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border-color: rgba(59, 130, 246, 0.3);
        }
        .tag-tech:hover { background: rgba(59, 130, 246, 0.25); }
        
        .tag-finance {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border-color: rgba(34, 197, 94, 0.3);
        }
        .tag-finance:hover { background: rgba(34, 197, 94, 0.25); }
        
        .tag-military {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }
        .tag-military:hover { background: rgba(239, 68, 68, 0.25); }
        
        .tag-international {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border-color: rgba(168, 85, 247, 0.3);
        }
        .tag-international:hover { background: rgba(168, 85, 247, 0.25); }
        
        .tag-default {
            background: var(--bg-primary);
            color: var(--text-secondary);
            border-color: var(--border);
        }
        .tag-default:hover { 
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .tag-more {
            background: transparent;
            color: var(--text-secondary);
            border: 1px dashed var(--border);
            font-size: 11px;
        }
        
        /* 状态提示 */
        .loading, .error, .empty, .loading-more {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .loading::before {
            content: '⏳ ';
        }
        
        .error { color: var(--error); }
        .empty { color: var(--text-secondary); }
        .loading-more { padding: 20px; }
        
        /* 加载更多按钮 */
        .load-more-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        
        .load-more-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 刷新按钮 */
        .refresh-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .refresh-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header { padding: 15px; }
            .main { padding: 15px; }
            .stats { flex-direction: column; gap: 8px; }
            .news-header { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">📰 新闻时间线 <span>NewsTimeline</span></h1>
            <p class="slogan">时事60s, 合全球资讯</p>
            <div class="categories" id="categories">
                <!-- 分类按钮由JS生成 -->
            </div>
        </div>
    </header>
    
    <!-- 主内容 -->
    <main class="main">
        <!-- 搜索框 -->
        <div class="search-container">
            <input type="text" class="search-box" id="searchBox" 
                   placeholder="🔍 搜索新闻标题或标签...（如：#AI #华为 #马斯克）" 
                   oninput="handleSearch(this.value)">
            <div class="search-results" id="searchResults"></div>
        </div>
        
        <!-- 统计信息 -->
        <div class="stats" id="stats">
            <div class="stats-item">📰 共 <span id="totalCount">0</span> 条新闻</div>
            <div class="stats-item">📋 当前显示 <span id="showCount">0</span> 条</div>
            <div class="stats-item" id="categoryStats">📂 全部分类</div>
            <button class="refresh-btn" id="refreshBtn" onclick="refreshNews()">🔄 刷新</button>
        </div>
        
        <!-- 新闻列表 -->
        <div class="news-list" id="newsList">
            <div class="loading">加载新闻中...</div>
        </div>
        
        <!-- 加载更多按钮 -->
        <button class="load-more-btn" id="loadMoreBtn" style="display:none" onclick="loadMore()">
            加载更多
        </button>
    </main>

    <script>
        // ========== 配置 ==========
        const API_BASE = 'https://newstimeline-api.onrender.com';
        const CATEGORIES = ['全部', '科技', '财经', '国际', '军事', '社会', '综合'];
        const PAGE_SIZE = 15;
        const MAX_TAGS_SHOW = 8; // 最多显示8个标签
        
        // 标签分类关键词
        const TAG_CATEGORIES = {
            tech: ['科技', 'AI', '技术', '芯片', '互联网', '软件', '手机', '电脑', '智能', '机器人', '自动驾驶', '5G', '量子', '大模型', 'ChatGPT', 'OpenAI', '英伟达', '华为', '苹果', '谷歌', '微软', '特斯拉', '马斯克', '脑机接口'],
            finance: ['财经', '经济', '股市', '金融', '投资', '银行', '货币', '通胀', '比特币', '美股', '港股', '基金', '降息', '加息', '美联储', '央行', 'GDP', '融资', '上市'],
            military: ['军事', '战争', '武器', '军队', '导弹', '国防', '航母', '演习', '核', '冲突', '制裁', '以色列', '伊朗', '乌克兰', '俄罗斯', '北约'],
            international: ['国际', '外交', '峰会', '美国', '中国', '欧洲', '亚洲', '中东', '联合国', 'G20', '欧盟', '英国', '法国', '德国', '日本', '韩国', '朝鲜', '普京', '拜登', '特朗普']
        };
        
        // ========== 状态 ==========
        let currentCategory = '全部';
        let currentOffset = 0;
        let isLoading = false;
        let hasMore = true;
        let totalNews = 0;
        let allNews = [];
        let searchKeyword = '';
        let searchTimeout = null;
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initCategories();
            loadNews();
        });
        
        // ========== 分类初始化 ==========
        function initCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = CATEGORIES.map(cat => 
                `<button class="category-btn ${cat === currentCategory ? 'active' : ''}" 
                         onclick="selectCategory('${cat}')">${cat}</button>`
            ).join('');
        }
        
        // ========== 选择分类 ==========
        function selectCategory(category) {
            currentCategory = category;
            currentOffset = 0;
            hasMore = true;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category);
            });
            
            document.getElementById('categoryStats').innerHTML = 
                category === '全部' ? '📂 全部分类' : `📂 ${category}`;
            
            loadNews();
        }
        
        // ========== 加载新闻 ==========
        async function loadNews() {
            if (isLoading) return;
            isLoading = true;
            
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = '<div class="loading">加载新闻中...</div>';
            
            try {
                let url = `${API_BASE}/api/news?limit=${PAGE_SIZE}&offset=0&refresh=true`;
                if (currentCategory !== '全部') {
                    url += `&category=${encodeURIComponent(currentCategory)}`;
                }
                
                const resp = await fetch(url);
                const data = await resp.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    currentOffset = data.data.length;
                    totalNews = data.total || data.data.length;
                    hasMore = data.has_more !== false;
                    
                    allNews = data.data;
                    
                    if (searchKeyword) {
                        renderNews(filterNews(searchKeyword));
                    } else {
                        renderNews(data.data);
                    }
                    updateStats();
                    updateLoadMoreBtn();
                } else {
                    newsList.innerHTML = '<div class="empty">暂无新闻，请点击刷新按钮获取最新内容</div>';
                    updateStats();
                }
            } catch (e) {
                console.error('加载失败:', e);
                newsList.innerHTML = `<div class="error">加载失败: ${e.message}</div>
                    <button onclick="loadNews()" style="
                        margin-top:10px;padding:10px 20px;background:#3b82f6;
                        color:white;border:none;border-radius:8px;cursor:pointer;
                    ">重试</button>`;
            }
            
            isLoading = false;
        }
        
        // ========== 刷新新闻 ==========
        async function refreshNews() {
            if (isLoading) return;
            
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            btn.textContent = '🔄 刷新中...';
            
            currentOffset = 0;
            hasMore = true;
            
            await loadNews();
            
            btn.classList.remove('loading');
            btn.textContent = '🔄 刷新';
        }
        
        // ========== 加载更多 ==========
        async function loadMore() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            
            const btn = document.getElementById('loadMoreBtn');
            btn.textContent = '加载中...';
            btn.disabled = true;
            
            try {
                let url = `${API_BASE}/api/news?limit=${PAGE_SIZE}&offset=${currentOffset}&refresh=true`;
                if (currentCategory !== '全部') {
                    url += `&category=${encodeURIComponent(currentCategory)}`;
                }
                
                const resp = await fetch(url);
                const data = await resp.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    currentOffset += data.data.length;
                    hasMore = data.has_more !== false;
                    
                    // 合并数据并去重
                    const newIds = new Set(allNews.map(n => n.id));
                    const newNews = data.data.filter(n => !newIds.has(n.id));
                    allNews = [...allNews, ...newNews];
                    
                    appendNews(newNews);
                    updateStats();
                } else {
                    hasMore = false;
                }
            } catch (e) {
                console.error('加载更多失败:', e);
            }
            
            btn.disabled = false;
            updateLoadMoreBtn();
            isLoading = false;
        }
        
        // ========== 渲染新闻列表（首次加载） ==========
        function renderNews(news) {
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = news.map(news => createNewsCard(news)).join('');
        }
        
        // ========== 追加新闻列表 ==========
        function appendNews(news) {
            const newsList = document.getElementById('newsList');
            newsList.insertAdjacentHTML('beforeend', news.map(news => createNewsCard(news)).join(''));
        }
        
        // ========== 获取标签样式类 ==========
        function getTagClass(tag) {
            const tagText = tag.replace('#', '');
            for (const [category, keywords] of Object.entries(TAG_CATEGORIES)) {
                if (keywords.some(kw => tagText.includes(kw) || kw.includes(tagText))) {
                    return `tag-${category}`;
                }
            }
            return 'tag-default';
        }
        
        // ========== 创建新闻卡片HTML ==========
        function createNewsCard(news) {
            const time = formatTime(news.published);
            const tags = news.tags || [];
            const showTags = tags.slice(0, MAX_TAGS_SHOW);
            const moreCount = tags.length - MAX_TAGS_SHOW;
            
            const tagsHtml = showTags.map(tag => {
                const tagClass = getTagClass(tag);
                return `<span class="tag ${tagClass}" onclick="event.stopPropagation(); goToTimeline('${tag}')">${tag}</span>`;
            }).join('');
            
            const moreHtml = moreCount > 0 
                ? `<span class="tag tag-more" onclick="event.stopPropagation(); goToTimeline('${tags[0]}')">+${moreCount}</span>` 
                : '';
            
            return `
                <article class="news-card" onclick="openNews('${news.url}')">
                    <div class="news-header">
                        <div class="news-meta">
                            <span class="news-source">${news.source || '未知来源'}</span>
                            <span>·</span>
                            <span class="news-time">${time}</span>
                        </div>
                        <span class="news-category">${news.category || '综合'}</span>
                    </div>
                    <h2 class="news-title">${news.title}</h2>
                    ${news.content ? `<p class="news-content">${news.content}</p>` : ''}
                    ${tags.length > 0 ? `<div class="news-tags">${tagsHtml}${moreHtml}</div>` : ''}
                </article>
            `;
        }
        
        // ========== 跳转到时间线 ==========
        function goToTimeline(tag) {
            // 移除#号用于URL
            const cleanTag = tag.replace('#', '');
            window.location.href = `timeline.html?tag=${encodeURIComponent(cleanTag)}`;
        }
        
        // ========== 更新时间按钮 ==========
        function updateLoadMoreBtn() {
            const btn = document.getElementById('loadMoreBtn');
            if (hasMore && currentOffset > 0) {
                btn.style.display = 'block';
                btn.textContent = hasMore ? '加载更多' : '没有更多了';
            } else {
                btn.style.display = 'none';
            }
        }
        
        // ========== 更新统计信息 ==========
        function updateStats() {
            document.getElementById('totalCount').textContent = totalNews;
            document.getElementById('showCount').textContent = currentOffset;
        }
        
        // ========== 格式化时间 ==========
        function formatTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = (now - date) / 1000;
            
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + '天前';
            
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }
        
        // ========== 搜索处理（防抖） ==========
        function handleSearch(keyword) {
            clearTimeout(searchTimeout);
            searchKeyword = keyword.trim().toLowerCase();
            
            if (!searchKeyword) {
                document.getElementById('searchResults').innerHTML = '';
                if (allNews.length > 0) {
                    renderNews(allNews);
                    updateStats();
                }
                return;
            }
            
            searchTimeout = setTimeout(() => {
                const filtered = filterNews(searchKeyword);
                renderNews(filtered);
                document.getElementById('showCount').textContent = filtered.length;
                
                const searchResults = document.getElementById('searchResults');
                if (filtered.length > 0) {
                    searchResults.innerHTML = `找到 <span>${filtered.length}</span> 条相关新闻 
                        <button class="clear-search" onclick="clearSearch()">清除搜索</button>`;
                } else {
                    searchResults.innerHTML = `未找到匹配的新闻 
                        <button class="clear-search" onclick="clearSearch()">清除搜索</button>`;
                }
            }, 300);
        }
        
        // ========== 过滤新闻 ==========
        function filterNews(keyword) {
            if (!keyword || allNews.length === 0) return allNews;
            
            // 支持搜索带#或不带#的标签
            const cleanKeyword = keyword.replace('#', '');
            
            return allNews.filter(news => {
                const titleMatch = (news.title || '').toLowerCase().includes(cleanKeyword);
                const tagsMatch = (news.tags || []).some(tag => 
                    tag.toLowerCase().replace('#', '').includes(cleanKeyword)
                );
                const contentMatch = (news.content || '').toLowerCase().includes(cleanKeyword);
                const sourceMatch = (news.source || '').toLowerCase().includes(cleanKeyword);
                
                return titleMatch || tagsMatch || contentMatch || sourceMatch;
            });
        }
        
        // ========== 清除搜索 ==========
        function clearSearch() {
            document.getElementById('searchBox').value = '';
            searchKeyword = '';
            document.getElementById('searchResults').innerHTML = '';
            if (allNews.length > 0) {
                renderNews(allNews);
                updateStats();
            }
        }
        
        // ========== 打开新闻详情 ==========
        function openNews(url) {
            if (url) {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
