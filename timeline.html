<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间线 - NewsTimeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .back-btn {
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
            font-size: 14px;
        }
        
        .back-btn:hover {
            background: var(--bg-primary);
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .action-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        /* 主内容 */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            margin-bottom: 30px;
        }
        
        .timeline-title {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .tag-badge {
            background: var(--accent);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 500;
        }
        
        .timeline-stats {
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            gap: 20px;
        }
        
        .timeline-stats span {
            color: var(--accent);
            font-weight: 600;
        }
        
        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 30px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 8px;
            width: 12px;
            height: 12px;
            background: var(--bg-primary);
            border: 3px solid var(--accent);
            border-radius: 50%;
        }
        
        .timeline-item:first-child::before {
            background: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
        }
        
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .news-card:hover {
            transform: translateX(5px);
            border-color: var(--accent);
        }
        
        .news-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            cursor: pointer;
            line-height: 1.5;
        }
        
        .news-title:hover {
            color: var(--accent);
        }
        
        .news-content {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        
        .news-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .news-source {
            color: var(--accent);
            font-weight: 500;
        }
        
        /* 标签样式 */
        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        /* 标签颜色分类 */
        .tag-tech {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .tag-tech:hover { background: rgba(59, 130, 246, 0.25); }
        
        .tag-finance {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .tag-finance:hover { background: rgba(34, 197, 94, 0.25); }
        
        .tag-military {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .tag-military:hover { background: rgba(239, 68, 68, 0.25); }
        
        .tag-international {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        .tag-international:hover { background: rgba(168, 85, 247, 0.25); }
        
        .tag-default {
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .tag-default:hover { 
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .tag.current {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .empty-state a {
            display: inline-block;
            padding: 10px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .empty-state a:hover {
            background: var(--accent-hover);
        }
        
        /* 时间线终点 */
        .timeline-end {
            background: linear-gradient(to right, var(--bg-card), transparent);
            border-left: 4px solid var(--accent);
            border-radius: 0 12px 12px 0;
            padding: 20px;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .timeline-end .label {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        /* 提示 */
        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 200;
            display: none;
            border: 1px solid var(--border);
        }
        
        .alert.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .timeline {
                padding-left: 20px;
            }
            
            .timeline::before {
                left: 3px;
            }
            
            .timeline-item::before {
                left: -21px;
                width: 8px;
                height: 8px;
            }
            
            .timeline-title {
                font-size: 22px;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .timeline-stats {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <div class="action-btns">
                <button class="action-btn" id="pinBtn" onclick="togglePin()">📌 置顶</button>
                <button class="action-btn" id="collectBtn" onclick="toggleCollect()">⭐ 收藏</button>
            </div>
        </div>
    </nav>
    
    <div class="main">
        <div class="header">
            <h1 class="timeline-title">
                <span class="tag-badge" id="tagBadge">#加载中...</span>
            </h1>
            <div class="timeline-stats">
                <span>📰</span> 共 <span id="totalCount">0</span> 条新闻
                <span>·</span> 按时间排序
            </div>
        </div>
        
        <div class="timeline" id="timeline">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <div class="alert" id="alert"></div>
    
    <script>
        // API 配置
        const API = "https://newstimeline-api.onrender.com/api";
        
        // 标签分类关键词
        const TAG_CATEGORIES = {
            tech: ['科技', 'AI', '技术', '芯片', '互联网', '软件', '手机', '电脑', '智能', '机器人', '自动驾驶', '5G', '量子', '大模型', 'ChatGPT', 'OpenAI', '英伟达', '华为', '苹果', '谷歌', '微软', '特斯拉', '马斯克', '脑机接口'],
            finance: ['财经', '经济', '股市', '金融', '投资', '银行', '货币', '通胀', '比特币', '美股', '港股', '基金', '降息', '加息', '美联储', '央行', 'GDP', '融资', '上市'],
            military: ['军事', '战争', '武器', '军队', '导弹', '国防', '航母', '演习', '核', '冲突', '制裁', '以色列', '伊朗', '乌克兰', '俄罗斯', '北约'],
            international: ['国际', '外交', '峰会', '美国', '中国', '欧洲', '亚洲', '中东', '联合国', 'G20', '欧盟', '英国', '法国', '德国', '日本', '韩国', '朝鲜', '普京', '拜登', '特朗普']
        };
        
        // 状态
        let tag = "";
        let displayTag = ""; // 用于显示的原始标签
        let offset = 0;
        let limit = 20;
        let isLoading = false;
        let hasMore = true;
        let items = [];
        let isPinned = false;
        let isCollected = false;
        
        // 获取 URL 参数
        const params = new URLSearchParams(location.search);
        tag = params.get("tag") || "";
        
        if (!tag) {
            location.href = "index.html";
            throw new Error("No tag");
        }
        
        // 初始化
        document.addEventListener("DOMContentLoaded", () => {
            // 标签可能带#号
            displayTag = tag.startsWith('#') ? tag : '#' + tag;
            if (!tag.startsWith('#')) {
                tag = '#' + tag;
            }
            
            document.getElementById("tagBadge").textContent = tag;
            document.title = tag + " - 时间线 - NewsTimeline";
            checkState();
            load();
        });
        
        // 获取标签样式类
        function getTagClass(t) {
            const tagText = t.replace('#', '');
            for (const [category, keywords] of Object.entries(TAG_CATEGORIES)) {
                if (keywords.some(kw => tagText.includes(kw) || kw.includes(tagText))) {
                    return `tag-${category}`;
                }
            }
            return 'tag-default';
        }
        
        // 检查本地状态
        function checkState() {
            const pinned = JSON.parse(localStorage.getItem("pinnedTags") || "[]");
            const collected = JSON.parse(localStorage.getItem("collectedTags") || "[]");
            
            // 标准化比较（带不带#号都行）
            const normalizeTag = t => t.replace('#', '');
            isPinned = pinned.some(t => normalizeTag(t) === normalizeTag(tag));
            isCollected = collected.some(t => normalizeTag(t) === normalizeTag(tag));
            updateButtons();
        }
        
        function updateButtons() {
            const pinBtn = document.getElementById("pinBtn");
            const collectBtn = document.getElementById("collectBtn");
            
            pinBtn.innerHTML = isPinned ? "📌 已置顶" : "📌 置顶";
            pinBtn.classList.toggle("active", isPinned);
            
            collectBtn.innerHTML = isCollected ? "⭐ 已收藏" : "⭐ 收藏";
            collectBtn.classList.toggle("active", isCollected);
        }
        
        function togglePin() {
            isPinned = !isPinned;
            const storeTag = tag.replace('#', ''); // 统一存储不带#的标签
            
            if (isPinned) {
                isCollected = true;
                addToLocalStorage("pinnedTags", storeTag);
                addToLocalStorage("collectedTags", storeTag);
                showAlert("已置顶并收藏");
            } else {
                removeFromLocalStorage("pinnedTags", storeTag);
                showAlert("已取消置顶");
            }
            updateButtons();
        }
        
        function toggleCollect() {
            isCollected = !isCollected;
            const storeTag = tag.replace('#', '');
            
            if (isCollected) {
                addToLocalStorage("collectedTags", storeTag);
                showAlert("已收藏");
            } else {
                removeFromLocalStorage("collectedTags", storeTag);
                showAlert("已取消收藏");
            }
            updateButtons();
        }
        
        function addToLocalStorage(key, value) {
            let arr = JSON.parse(localStorage.getItem(key) || "[]");
            const normalized = arr.map(t => t.replace('#', ''));
            if (!normalized.includes(value.replace('#', ''))) {
                arr.push(value);
                localStorage.setItem(key, JSON.stringify(arr));
            }
        }
        
        function removeFromLocalStorage(key, value) {
            let arr = JSON.parse(localStorage.getItem(key) || "[]");
            arr = arr.filter(x => x.replace('#', '') !== value.replace('#', ''));
            localStorage.setItem(key, JSON.stringify(arr));
        }
        
        // 加载新闻
        async function load() {
            if (isLoading) return;
            isLoading = true;
            
            const container = document.getElementById("timeline");
            
            if (offset === 0) {
                container.innerHTML = '<div class="loading">加载中...</div>';
            }
            
            try {
                // 搜索时去掉#号
                const searchTag = tag.replace('#', '');
                const url = `${API}/news?limit=${limit}&offset=${offset}&keyword=${encodeURIComponent(searchTag)}&refresh=true`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById("totalCount").textContent = data.total || 0;
                
                if (offset === 0 && (!data.data || data.data.length === 0)) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <h3>暂无相关新闻</h3>
                            <p>标签 "${tag}" 下还没有新闻</p>
                            <a href="index.html">← 返回首页</a>
                        </div>
                    `;
                    isLoading = false;
                    return;
                }
                
                // 筛选包含该标签的新闻
                const searchTagLower = searchTag.toLowerCase();
                data.data.forEach(news => {
                    const newsTags = news.tags || [];
                    // 检查是否包含该标签（带不带#号都匹配）
                    const hasTag = newsTags.some(t => 
                        t.replace('#', '').toLowerCase() === searchTagLower
                    );
                    if (hasTag) {
                        items.push(news);
                    }
                });
                
                hasMore = data.has_more !== false;
                offset += data.data.length;
                
                render();
            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <h3>加载失败</h3>
                        <p>${e.message}</p>
                        <a href="index.html">← 返回首页</a>
                    </div>
                `;
            }
            
            isLoading = false;
        }
        
        // 渲染
        function render() {
            const container = document.getElementById("timeline");
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>暂无新闻</h3>
                        <p>标签 "${tag}" 下还没有新闻</p>
                        <a href="index.html">← 返回首页</a>
                    </div>
                `;
                return;
            }
            
            // 按时间排序（新的在前）
            const sorted = [...items].sort((a, b) => {
                return new Date(b.published || 0) - new Date(a.published || 0);
            });
            
            container.innerHTML = sorted.map(news => {
                const newsTags = news.tags || [];
                const tagHtml = newsTags.map(t => {
                    const isCurrent = t.replace('#', '').toLowerCase() === tag.replace('#', '').toLowerCase();
                    const tagClass = getTagClass(t);
                    return `<span class="tag ${tagClass} ${isCurrent ? 'current' : ''}" onclick="goTag('${t.replace('#', '')}')">${t}</span>`;
                }).join('');
                
                return `
                    <div class="timeline-item">
                        <div class="news-card">
                            <div class="news-title" onclick="window.open('${news.url || '#'}', '_blank')">
                                ${news.title}
                            </div>
                            ${news.content ? `<div class="news-content">${news.content}</div>` : ''}
                            <div class="news-meta">
                                <span class="news-source">📰 ${news.source || '未知来源'}</span>
                                <span>🕐 ${formatTime(news.published)}</span>
                            </div>
                            ${tagHtml ? `<div class="news-tags">${tagHtml}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            if (!hasMore) {
                container.innerHTML += `
                    <div class="timeline-end">
                        <div class="label">🚩 时间线终点</div>
                        <p>以上是 "${tag}" 的全部 ${items.length} 条相关新闻</p>
                    </div>
                `;
            } else if (items.length >= 10) {
                // 如果还有更多，加载更多
                container.innerHTML += `
                    <div style="text-align: center; padding: 20px;">
                        <button onclick="loadMore()" style="
                            padding: 12px 24px;
                            background: var(--bg-card);
                            border: 1px solid var(--border);
                            border-radius: 8px;
                            color: var(--text-primary);
                            cursor: pointer;
                            font-size: 14px;
                        ">加载更多</button>
                    </div>
                `;
            }
        }
        
        async function loadMore() {
            await load();
        }
        
        function goTag(t) {
            const normalizedT = t.startsWith('#') ? t : '#' + t;
            if (normalizedT.replace('#', '').toLowerCase() === tag.replace('#', '').toLowerCase()) return;
            location.href = "timeline.html?tag=" + encodeURIComponent(t);
        }
        
        function formatTime(dateStr) {
            if (!dateStr) return "";
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return "刚刚";
            if (diff < 3600000) return Math.floor(diff / 60000) + "分钟前";
            if (diff < 86400000) return Math.floor(diff / 3600000) + "小时前";
            if (diff < 604800000) return Math.floor(diff / 86400000) + "天前";
            
            return date.toLocaleDateString("zh-CN", {
                year: "numeric",
                month: "long",
                day: "numeric"
            });
        }
        
        function showAlert(message) {
            const alert = document.getElementById("alert");
            alert.textContent = message;
            alert.classList.add("show");
            setTimeout(() => alert.classList.remove("show"), 2000);
        }
    </script>
</body>
</html>
