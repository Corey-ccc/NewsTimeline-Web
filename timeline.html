<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间线 - NewsTimeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .back-btn {
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .back-btn:hover {
            background: var(--bg-primary);
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .action-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        /* 主内容 */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            margin-bottom: 30px;
        }
        
        .timeline-title {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .tag-badge {
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
        }
        
        .timeline-stats {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 30px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 6px;
            width: 12px;
            height: 12px;
            background: var(--bg-primary);
            border: 3px solid var(--accent);
            border-radius: 50%;
        }
        
        .timeline-item:first-child::before {
            background: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
        }
        
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .news-card:hover {
            transform: translateX(5px);
            border-color: var(--accent);
        }
        
        .news-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            cursor: pointer;
            line-height: 1.5;
        }
        
        .news-title:hover {
            color: var(--accent);
        }
        
        .news-content {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        
        .news-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            padding: 4px 12px;
            background: var(--bg-primary);
            color: var(--accent);
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tag:hover {
            background: var(--accent);
            color: white;
        }
        
        .tag.current {
            background: var(--accent);
            color: white;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        /* 时间线终点 */
        .timeline-end {
            background: linear-gradient(to right, var(--bg-card), transparent);
            border-left: 4px solid var(--accent);
            border-radius: 0 12px 12px 0;
            padding: 20px;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .timeline-end .label {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        /* 提示 */
        .alert {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 200;
            display: none;
            border: 1px solid var(--border);
        }
        
        .alert.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .timeline {
                padding-left: 20px;
            }
            
            .timeline::before {
                left: 3px;
            }
            
            .timeline-item::before {
                left: -21px;
                width: 8px;
                height: 8px;
            }
            
            .timeline-title {
                font-size: 22px;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <div class="action-btns">
                <button class="action-btn" id="pinBtn" onclick="togglePin()">📌 置顶</button>
                <button class="action-btn" id="collectBtn" onclick="toggleCollect()">⭐ 收藏</button>
            </div>
        </div>
    </nav>
    
    <div class="main">
        <div class="header">
            <h1 class="timeline-title">
                <span class="tag-badge" id="tagBadge">#加载中...</span>
            </h1>
            <div class="timeline-stats">共 <span id="totalCount">0</span> 条新闻 · 按时间排序</div>
        </div>
        
        <div class="timeline" id="timeline">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <div class="alert" id="alert"></div>
    
    <script>
        // API 配置
        const API = "https://newstimeline-api.onrender.com/api";
        
        // 状态
        let tag = "";
        let offset = 0;
        let limit = 10;
        let isLoading = false;
        let hasMore = true;
        let items = [];
        let isPinned = false;
        let isCollected = false;
        
        // 获取 URL 参数
        tag = new URLSearchParams(location.search).get("tag") || "";
        if (!tag) {
            location.href = "index.html";
            throw new Error("No tag");
        }
        
        // 初始化
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("tagBadge").textContent = "#" + tag;
            document.title = tag + " - 时间线 - NewsTimeline";
            checkState();
            load();
            
            // 无限滚动
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isLoading && hasMore) {
                    load();
                }
            }, { rootMargin: "100px" });
            
            observer.observe(document.getElementById("timeline"));
        });
        
        // 检查本地状态
        function checkState() {
            const pinned = JSON.parse(localStorage.getItem("pinnedTags") || "[]");
            const collected = JSON.parse(localStorage.getItem("collectedTags") || "[]");
            isPinned = pinned.includes(tag);
            isCollected = collected.includes(tag);
            updateButtons();
        }
        
        function updateButtons() {
            const pinBtn = document.getElementById("pinBtn");
            const collectBtn = document.getElementById("collectBtn");
            
            pinBtn.innerHTML = isPinned ? "📌 已置顶" : "📌 置顶";
            pinBtn.classList.toggle("active", isPinned);
            
            collectBtn.innerHTML = isCollected ? "⭐ 已收藏" : "⭐ 收藏";
            collectBtn.classList.toggle("active", isCollected);
        }
        
        function togglePin() {
            isPinned = !isPinned;
            if (isPinned) {
                isCollected = true;
                addToLocalStorage("pinnedTags", tag);
                addToLocalStorage("collectedTags", tag);
                showAlert("已置顶并收藏");
            } else {
                removeFromLocalStorage("pinnedTags", tag);
                showAlert("已取消置顶");
            }
            updateButtons();
        }
        
        function toggleCollect() {
            isCollected = !isCollected;
            if (isCollected) {
                addToLocalStorage("collectedTags", tag);
                showAlert("已收藏");
            } else {
                removeFromLocalStorage("collectedTags", tag);
                showAlert("已取消收藏");
            }
            updateButtons();
        }
        
        function addToLocalStorage(key, value) {
            let arr = JSON.parse(localStorage.getItem(key) || "[]");
            if (!arr.includes(value)) {
                arr.push(value);
                localStorage.setItem(key, JSON.stringify(arr));
            }
        }
        
        function removeFromLocalStorage(key, value) {
            let arr = JSON.parse(localStorage.getItem(key) || "[]");
            arr = arr.filter(x => x !== value);
            localStorage.setItem(key, JSON.stringify(arr));
        }
        
        // 加载新闻
        async function load() {
            if (isLoading) return;
            isLoading = true;
            
            const container = document.getElementById("timeline");
            
            if (offset === 0) {
                container.innerHTML = '<div class="loading">加载中...</div>';
            }
            
            try {
                // 使用搜索 API 过滤标签
                const url = `${API}/news?limit=${limit}&offset=${offset}&keyword=${encodeURIComponent(tag)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById("totalCount").textContent = data.total || 0;
                
                if (offset === 0 && data.data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <h3>暂无相关新闻</h3>
                            <p>标签 "${tag}" 下还没有新闻</p>
                        </div>
                    `;
                    isLoading = false;
                    return;
                }
                
                // 添加数据
                data.data.forEach(news => {
                    // 检查是否包含该标签
                    if (news.tags && news.tags.includes(tag)) {
                        items.push(news);
                    }
                });
                
                hasMore = data.has_more;
                offset += data.data.length;
                
                render();
            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <h3>加载失败</h3>
                        <p>${e.message}</p>
                        <button onclick="load()" style="margin-top: 10px; padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;">🔄 重试</button>
                    </div>
                `;
            }
            
            isLoading = false;
        }
        
        // 渲染
        function render() {
            const container = document.getElementById("timeline");
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>暂无新闻</h3></div>';
                return;
            }
            
            // 按时间排序（新的在前）
            const sorted = [...items].sort((a, b) => {
                return new Date(b.published) - new Date(a.published);
            });
            
            container.innerHTML = sorted.map(news => `
                <div class="timeline-item">
                    <div class="news-card">
                        <div class="news-title" onclick="window.open('${news.url}', '_blank')">
                            ${news.title}
                        </div>
                        ${news.content ? `<div class="news-content">${news.content}</div>` : ''}
                        <div class="news-meta">
                            <span>📰 ${news.source || '未知来源'}</span>
                            <span>🕐 ${formatTime(news.published)}</span>
                        </div>
                        <div class="news-tags">
                            ${(news.tags || []).map(t => 
                                `<span class="tag ${t === tag ? 'current' : ''}" onclick="goTag('${t}')">${t}</span>`
                            ).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (!hasMore) {
                container.innerHTML += `
                    <div class="timeline-end">
                        <div class="label">🚩 时间线终点</div>
                        <p>以上是 "${tag}" 的全部 ${items.length} 条相关新闻</p>
                    </div>
                `;
            }
        }
        
        function goTag(t) {
            if (t === tag) return;
            location.href = "timeline.html?tag=" + encodeURIComponent(t);
        }
        
        function formatTime(dateStr) {
            if (!dateStr) return "";
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return "刚刚";
            if (diff < 3600000) return Math.floor(diff / 60000) + "分钟前";
            if (diff < 86400000) return Math.floor(diff / 3600000) + "小时前";
            if (diff < 604800000) return Math.floor(diff / 86400000) + "天前";
            
            return date.toLocaleDateString("zh-CN", {
                year: "numeric",
                month: "long",
                day: "numeric"
            });
        }
        
        function showAlert(message) {
            const alert = document.getElementById("alert");
            alert.textContent = message;
            alert.classList.add("show");
            setTimeout(() => alert.classList.remove("show"), 3000);
        }
    </script>
</body>
</html>
